name: Daily Scrum Reminder

on:
  schedule:
    # 매주 월(1), 목(4) 19:00 KST = 10:00 UTC
    - cron: "0 10 * * 1,4"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send scrum reminder
        env:
          BOT_ENV: ${{ secrets.DISCORD_BOT_SECRET }}
        run: |
          if [ -z "$BOT_ENV" ]; then
            echo "Secret DISCORD_BOT_SECRET is empty or not set"
            exit 1
          fi

          extract() {
            printf '%s\n' "$BOT_ENV" | grep -E "^$1=" | head -1 | cut -d= -f2- | tr -d '[:space:]'
          }

          DISCORD_TOKEN=$(extract DISCORD_TOKEN)
          CHANNEL_ID=$(extract CHANNEL_ID)
          FRONT_ROLE_ID=$(extract FRONT_ROLE_ID)
          BACK_ROLE_ID=$(extract BACK_ROLE_ID)

          for var in DISCORD_TOKEN CHANNEL_ID FRONT_ROLE_ID BACK_ROLE_ID; do
            if [ -z "${!var}" ]; then
              echo "Missing $var in BOT_ENV secret"
              exit 1
            fi
          done

          echo "URL: https://discord.com/api/v10/channels/$CHANNEL_ID/messages"
          echo "FRONT length=${#FRONT_ROLE_ID}, BACK length=${#BACK_ROLE_ID}"

          content=$(printf '<@&%s> <@&%s>\n📝 **데일리 스크럼 작성 시간입니다!**\n오늘 완료한 작업 / 계획한 작업 / 장애 요소 / 추가 논의 사항을 공유해 주세요.' "$FRONT_ROLE_ID" "$BACK_ROLE_ID")

          payload=$(jq -n \
            --arg content "$content" \
            --arg f "$FRONT_ROLE_ID" \
            --arg b "$BACK_ROLE_ID" \
            '{content: $content, allowed_mentions: {roles: [$f, $b]}}')

          response=$(curl -sS -w "\n%{http_code}" -X POST \
            "https://discord.com/api/v10/channels/$CHANNEL_ID/messages" \
            -H "Authorization: Bot $DISCORD_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload")

          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)

          echo "HTTP $status"
          echo "$body"

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            exit 1
          fi
