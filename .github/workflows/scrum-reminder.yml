name: Daily Scrum Reminder

on:
  schedule:
    # 매주 월(1), 목(4) 19:00 KST = 10:00 UTC
    - cron: "0 10 * * 1,4"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Send scrum reminder
        env:
          TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CHANNEL: ${{ secrets.CHANNEL_ID }}
          FRONT: ${{ secrets.FRONT_ROLE_ID }}
          BACK: ${{ secrets.BACK_ROLE_ID }}
        run: |
          CHANNEL=$(printf '%s' "$CHANNEL" | tr -d '[:space:]')
          FRONT=$(printf '%s' "$FRONT" | tr -d '[:space:]')
          BACK=$(printf '%s' "$BACK" | tr -d '[:space:]')
          TOKEN=$(printf '%s' "$TOKEN" | tr -d '[:space:]')

          echo "URL: https://discord.com/api/v10/channels/$CHANNEL/messages"
          echo "FRONT length=${#FRONT}, BACK length=${#BACK}"

          content=$(printf '<@&%s> <@&%s>\n📝 **데일리 스크럼 작성 시간입니다!**\n오늘 완료한 작업 / 계획한 작업 / 장애 요소 / 추가 논의 사항을 공유해 주세요.' "$FRONT" "$BACK")

          payload=$(jq -n \
            --arg content "$content" \
            --arg f "$FRONT" \
            --arg b "$BACK" \
            '{content: $content, allowed_mentions: {roles: [$f, $b]}}')

          response=$(curl -sS -w "\n%{http_code}" -X POST \
            "https://discord.com/api/v10/channels/$CHANNEL/messages" \
            -H "Authorization: Bot $TOKEN" \
            -H "Content-Type: application/json" \
            -d "$payload")

          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)

          echo "HTTP $status"
          echo "$body"

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            exit 1
          fi
